services:
  mfaserver:
    build: .
    restart: unless-stopped
    ports:
      - "8090:8090"
    env_file: .env
    volumes:
      - mfa-data:/data
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  mfa-data:
  redis-data:
